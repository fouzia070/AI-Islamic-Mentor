<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Islamic Mentor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>🕌 AI Islamic Mentor</h1>
        <p>Create your account</p>
    </div>

    <!-- Register Form -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Register to save your query history</p>

            <!-- Error Message -->
            <div class="error-msg" id="errorMsg"></div>

            <!-- Success Message -->
            <div class="success-msg" id="successMsg"></div>

            <!-- Name Input -->
            <div class="input-group">
                <label>Full Name</label>
                <input
                    type="text"
                    id="nameInput"
                    placeholder="Enter your full name"
                    onkeydown="if(event.key==='Enter') registerUser()"
                >
            </div>

            <!-- Email Input -->
            <div class="input-group">
                <label>Email Address</label>
                <input
                    type="email"
                    id="emailInput"
                    placeholder="Enter your email"
                    onkeydown="if(event.key==='Enter') registerUser()"
                >
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    id="passwordInput"
                    placeholder="Minimum 6 characters"
                    onkeydown="if(event.key==='Enter') registerUser()"
                >
            </div>

            <!-- Confirm Password Input -->
            <div class="input-group">
                <label>Confirm Password</label>
                <input
                    type="password"
                    id="confirmPasswordInput"
                    placeholder="Re-enter your password"
                    onkeydown="if(event.key==='Enter') registerUser()"
                >
            </div>

            <!-- Register Button -->
            <button onclick="registerUser()" id="registerBtn" class="btn-auth">
                Create Account
            </button>

            <!-- Login Link -->
            <p class="auth-link">
                Already have an account?
                <a href="/login">Login here</a>
            </p>

            <!-- Back to Chat -->
            <p class="auth-link">
                <a href="/">← Back to Chat</a>
            </p>
        </div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDddr2-_xX13KYUeAU2F6s4_pBzlSEmEb0",
            authDomain: "ai-islamic-mentor-baeed.firebaseapp.com",
            projectId: "ai-islamic-mentor-baeed",
            storageBucket: "ai-islamic-mentor-baeed.firebasestorage.app",
            messagingSenderId: "851411732968",
            appId: "1:851411732968:web:b5626eddc137b6f602bc5d"
        };

        firebase.initializeApp(firebaseConfig);

        async function registerUser() {
            const name            = document.getElementById("nameInput").value;
            const email           = document.getElementById("emailInput").value;
            const password        = document.getElementById("passwordInput").value;
            const confirmPassword = document.getElementById("confirmPasswordInput").value;
            const errorMsg        = document.getElementById("errorMsg");
            const successMsg      = document.getElementById("successMsg");
            const registerBtn     = document.getElementById("registerBtn");

            // Hide previous messages
            errorMsg.style.display   = "none";
            successMsg.style.display = "none";

            // Validation checks
            if (!name || !email || !password || !confirmPassword) {
                errorMsg.textContent   = "Please fill in all fields.";
                errorMsg.style.display = "block";
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent   = "Password must be at least 6 characters.";
                errorMsg.style.display = "block";
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent   = "Passwords do not match.";
                errorMsg.style.display = "block";
                return;
            }

            // Disable button while registering
            registerBtn.disabled    = true;
            registerBtn.textContent = "Creating account...";

            try {
                // Register with Firebase
                await firebase.auth().createUserWithEmailAndPassword(email, password);

                // Show success message
                successMsg.textContent   = "Account created successfully! Redirecting...";
                successMsg.style.display = "block";

                // Redirect to chat after 2 seconds
                setTimeout(() => {
                    window.location.href = "/";
                }, 2000);

            } catch (error) {
                errorMsg.textContent   = "Registration failed: " + error.message;
                errorMsg.style.display = "block";

                registerBtn.disabled    = false;
                registerBtn.textContent = "Create Account";
            }
        }
    </script>

</body>
</html>
